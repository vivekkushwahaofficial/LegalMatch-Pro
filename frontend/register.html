<!DOCTYPE html>
<html>
<head>
  <title>LegalMatch - Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="logo">⚖ LegalAid Match</div>
  <div class="subtitle">Create your free account</div>

  <form id="registerForm">
    <input type="text" placeholder="Full Name" required id="name">
    <input type="email" placeholder="Email" required id="email">
    <input type="password" placeholder="Password" required id="password">
    <input type="password" placeholder="Confirm Password" required id="confirmPassword">

    <button class="submit-btn">Register</button>
  </form>

  <div style="text-align:center;margin-top:15px;">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
