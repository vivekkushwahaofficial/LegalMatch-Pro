name: CI Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  backend-test:
    name: Backend Test & Build
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: legalmatch_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secureDBpass2026!
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test Backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/legalmatch_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: secureDBpass2026!
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
          SPRING_FLYWAY_ENABLED: "true"
          SPRING_JPA_HIBERNATE_DDL_AUTO: validate
          JWT_SECRET: prod-grade-super-secure-jwt-secret-key-32-chars-minimum
          SPRING_PROFILES_ACTIVE: dev
        run: |
          cd backend
          mvn clean test

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Compile Vite Production Bundle
        run: |
          cd frontend
          npm run build

  docker-validate:
    name: Docker Configuration Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Compose File Syntax
        run: |
          docker compose config
