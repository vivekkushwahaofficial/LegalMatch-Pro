# ═══════════════════════════════════
# LegalMatch Pro — Test Configuration
# ═══════════════════════════════════

spring.profiles.active=test

# Use H2 in-memory database with PostgreSQL compatibility mode by default
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:legalmatch_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Hibernate
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Flyway for local H2 unit tests by default to avoid dialect/migration compatibility issues
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}

# JWT Configuration for testing
jwt.secret=${JWT_SECRET:test-grade-super-secure-jwt-secret-key-32-chars-minimum}
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=86400000

# Invite Code for test registrations
app.auth.admin-invite-code=TEST_INVITE_CODE

# Server
server.port=8081
