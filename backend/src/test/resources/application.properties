# ═══════════════════════════════════
# LegalMatch Pro — Test Configuration
# ═══════════════════════════════════

spring.profiles.active=test

# Use H2 in-memory database with PostgreSQL compatibility mode
spring.datasource.url=jdbc:h2:mem:legalmatch_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Flyway for local H2 unit tests to avoid dialect/migration compatibility issues
spring.flyway.enabled=false

# JWT Configuration for testing
jwt.secret=test-grade-super-secure-jwt-secret-key-32-chars-minimum
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=86400000

# Invite Code for test registrations
app.auth.admin-invite-code=TEST_INVITE_CODE

# Server
server.port=8081
