# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/legalmatch_db
spring.datasource.username=postgres
spring.datasource.password=0105cs243d21

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable H2 console
spring.h2.console.enabled=false

# JWT configuration
jwt.secret=${JWT_SECRET:replace-me-with-a-secure-32-char-min-secret-key}
jwt.access-token-expiration-ms=43200000
jwt.refresh-token-expiration-ms=86400000

# Optional admin invite code for controlled ADMIN registrations
app.auth.admin-invite-code=${ADMIN_INVITE_CODE:}

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.sql-migration-separator=_


