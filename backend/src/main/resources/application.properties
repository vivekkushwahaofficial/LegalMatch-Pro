# Database configuration
# Default to an in-memory H2 database for local dev when no datasource env vars are set.
# Override with SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:legalmatch_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable Flyway by default for local H2 development. Enable explicitly when using PostgreSQL or migrations.
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.sql-migration-separator=_

# Enable H2 console for local development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Optional Postgres overrides for local or production environments
# SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/legalmatch_db
# SPRING_DATASOURCE_USERNAME=postgres
# SPRING_DATASOURCE_PASSWORD=your_password_here
# SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
# SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
# SPRING_FLYWAY_ENABLED=true

# JWT configuration
jwt.secret=${JWT_SECRET:replace-me-with-a-secure-32-char-min-secret-key}
jwt.access-token-expiration-ms=43200000
jwt.refresh-token-expiration-ms=86400000

# Optional admin invite code for controlled ADMIN registrations
app.auth.admin-invite-code=${ADMIN_INVITE_CODE:AdminInvite2026}


