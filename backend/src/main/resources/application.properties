# ═══════════════════════════════════
# LegalMatch Pro — Configuration
# ═══════════════════════════════════

# Active profile: override with SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── Database ──
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/legalmatch_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ── JPA ──
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ── Flyway ──
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── H2 ──
spring.h2.console.enabled=false

# ── JWT ──
jwt.secret=${JWT_SECRET:}
jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRY:3600000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRY:86400000}

# ── Auth ──
app.auth.admin-invite-code=${ADMIN_INVITE_CODE:}

# ── CORS ──
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── Actuator ──
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=LegalMatch Pro
info.app.version=1.0.0

# ── Swagger ──
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ──
logging.level.root=INFO
logging.level.com.legalmatch=DEBUG
logging.level.org.springframework.security=WARN

# ── Server ──
server.port=${SERVER_PORT:8080}
server.error.include-message=always

# ── Actuator Probes ──
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoints.web.exposure.include=health,info,metrics