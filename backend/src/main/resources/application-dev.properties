# ═══════════════════════════════════
# LegalMatch Pro — Development Profile Configuration
# ═══════════════════════════════════

# ── Database & JPA ──
# Automatically creates/updates tables in dev mode
spring.datasource.password=${DB_PASSWORD:secureDBpass2026!}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true

# ── JWT ──
jwt.secret=dev-only-secret-key-must-be-32-chars-min!!

# ── Logging ──
logging.level.root=INFO
logging.level.com.legalmatch=DEBUG
logging.level.org.springframework.security=INFO

# ── Actuator ──
management.endpoint.health.show-details=always
